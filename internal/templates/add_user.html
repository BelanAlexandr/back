<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>

    <h2>Регистрация нового пользователя</h2>
    
    <form id="registerForm">
        <!-- Поле Логин -->
        <input type="text" id="username" placeholder="Логин" required><br><br>
        
        <!-- Поле Пароль -->
        <input type="password" id="password" placeholder="Пароль" required><br><br>
        
        <!-- Выпадающий список выбора Роли -->
        <label for="role">Выберите роль:</label><br>
        <select id="role" required>
            <option value="1">admin</option>
            <option value="2">director</option>
            <option value="3">employee</option>
        </select><br><br>

        <button type="submit">Зарегистрироваться</button>
    </form>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Отменяем перезагрузку страницы

            const login = document.getElementById('username').value;
            const password = document.getElementById('password').value;
           const role = Number(document.getElementById("role").value); // Получаем выбранную роль

            try {
                // Отправляем JSON на /api/register
                const response = await fetch('/api/adduser', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ login, password, role })
                });

                if (response.ok) {
                    alert('Регистрация успешна!');
                } else {
                    alert('Ошибка сервера: ' + response.status);
                }
            } catch (error) {
                console.error('Ошибка сети:', error);
                alert('Не удалось отправить запрос на регистрацию');
            }
        });
    </script>

</body>
</html>
